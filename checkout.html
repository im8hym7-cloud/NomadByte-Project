<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الشراء | NomadByte</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container checkout-container">
        <h2 class="product-title" style="text-align: center; margin-bottom: 40px;">إتمام طلبك</h2>

        <div class="checkout-layout">
            
            <div class="order-summary">
                <h3 style="margin-top: 0;">ملخص السلة</h3>
                <div class="product-item-small">
                    <img src="5.jpg" alt="حقيبة غسيل الأحذية">
                    <div>
                        <p style="margin: 0; font-weight: bold;">حقيبة غسيل الأحذية الذكية</p>
                        <span style="color: var(--secondary-color); font-weight: bold;">49 SAR</span>
                    </div>
                </div>
                <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
                <div style="display: flex; justify-content: space-between; font-size: 20px; font-weight: bold;">
                    <span>الإجمالي:</span>
                    <span class="price-now">49 SAR</span>
                </div>
            </div>

            <div class="shipping-form">
                <form id="checkoutForm">
                    <label for="name">الاسم الكامل</label>
                    <input type="text" id="name" name="name" placeholder="أدخل اسمك هنا" required>

                    <label for="phone">رقم الجوال</label>
                    <input type="tel" id="phone" name="phone" placeholder="05xxxxxxxx" required>

                    <label for="city">المدينة</label>
                    <select id="city" name="city" required>
                        <option value="">اختر مدينتك</option>
                        <option value="dammam">الدمام</option>
                        <option value="khobar">الخبر</option>
                        <option value="riyadh">الرياض</option>
                        <option value="jeddah">جدة</option>
                    </select>

                    <label for="address">العنوان بالتفصيل</label>
                    <input type="text" id="address" name="address" placeholder="اسم الحي والشارع" required>

                    <button type="submit" class="finish-btn">تأكيد الطلب الآن</button>
                </form>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
