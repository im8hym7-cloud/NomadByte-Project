<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الشراء | NomadByte</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="checkout-container">
        <h2 class="checkout-title">إتمام عملية الشراء</h2>

        <div class="checkout-layout">
            
            <div class="order-summary">
                <h3>ملخص الطلب</h3>
                <div class="product-item">
                    <img src="5.jpg" alt="حقيبة الأحذية">
                    <div class="product-info">
                        <p>حقيبة غسيل الأحذية الذكية</p>
                        <span>49 SAR</span>
                    </div>
                </div>
                <hr>
                <div class="total-row">
                    <span>الإجمالي:</span>
                    <span class="total-price">49 SAR</span>
                </div>
                <p class="shipping-hint">🚛 شحن سريع لجميع مناطق المملكة</p>
            </div>

            <div class="shipping-form">
                <h3>بيانات الشحن والتوصيل</h3>
                <form id="checkoutForm">
                    <label>الاسم الكامل</label>
                    <input type="text" id="name" placeholder="أدخل اسمك الثلاثي" required>

                    <label>رقم الجوال</label>
                    <input type="tel" id="phone" placeholder="05xxxxxxxx" required>

                    <label>المدينة</label>
                    <select id="city" required>
                        <option value="">اختر المدينة</option>
                        <option value="dammam">الدمام</option>
                        <option value="khobar">الخبر</option>
                        <option value="riyadh">الرياض</option>
                        <option value="jeddah">جدة</option>
                        <option value="other">مدينة أخرى</option>
                    </select>

                    <label>العنوان بالتفصيل</label>
                    <input type="text" id="address" placeholder="الحي، الشارع، رقم المنزل" required>

                    <div class="payment-methods">
                        <p>وسائل الدفع المتاحة:</p>
                        <div class="payment-icons">
                            <span>💳 مدى / فيزا</span>
                            <span> Pay</span>
                        </div>
                    </div>

                    <button type="submit" class="finish-btn">إتمام الطلب - 49 SAR</button>
                </form>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
