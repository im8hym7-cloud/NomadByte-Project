<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الطلب | NomadByte</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="checkout-layout">
            <div class="order-summary card">
                <h3>ملخص طلبك</h3>
                <div class="product-item-small">
                    <img src="5.jpg" alt="Product">
                    <div>
                        <p>حقيبة غسيل الأحذية الذكية</p>
                        <span class="price-now">49 SAR</span>
                    </div>
                </div>
                <div class="total-section">
                    <span>الإجمالي النهائي:</span>
                    <span>49 SAR</span>
                </div>
            </div>

            <div class="shipping-form card">
                <h3>بيانات الشحن</h3>
                <form id="checkoutForm">
                    <label>الاسم الكامل</label>
                    <input type="text" placeholder="اسمك الثلاثي" required>
                    <label>رقم الجوال</label>
                    <input type="tel" placeholder="05xxxxxxxx" required>
                    <label>المدينة</label>
                    <select required>
                        <option value="">اختر المدينة</option>
                        <option>الدمام</option>
                        <option>الرياض</option>
                        <option>جدة</option>
                    </select>
                    <label>العنوان</label>
                    <input type="text" placeholder="الحي والشارع" required>
                    <button type="submit" class="finish-btn">تأكيد الطلب الآن</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
