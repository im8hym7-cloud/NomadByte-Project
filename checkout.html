<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الطلب | NomadByte</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="checkout-layout">
            <div class="order-summary card-box">
                <h3>ملخص طلبك</h3>
                <div class="product-item-small">
                    <img src="5.jpg">
                    <div>
                        <p>حقيبة غسيل الأحذية الذكية</p>
                        <strong class="price-now" style="font-size: 20px;">49 SAR</strong>
                    </div>
                </div>
                <hr>
                <p>الإجمالي: 49 SAR</p>
            </div>
            <div class="shipping-form card-box">
                <h3>بيانات الشحن</h3>
                <form id="checkoutForm">
                    <input type="text" placeholder="الاسم الكامل" required>
                    <input type="tel" placeholder="رقم الجوال" required>
                    <select required>
                        <option value="">اختر المدينة</option>
                        <option>الدمام</option><option>الرياض</option><option>جدة</option>
                    </select>
                    <input type="text" placeholder="العنوان بالتفصيل" required>
                    <button type="submit" class="finish-btn">تأكيد الطلب</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
