<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الطلب | NomadByte</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2 style="text-align: center; margin-bottom: 30px;">إتمام طلبك</h2>
        <div class="checkout-grid">
            <div class="box">
                <h3>ملخص طلبك</h3>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <img src="5.jpg" style="width: 80px; border-radius: 10px;">
                    <div>
                        <p style="margin: 0;">حقيبة غسيل الأحذية الذكية</p>
                        <strong>49 SAR</strong>
                    </div>
                </div>
                <hr style="margin: 20px 0; border: 0.5px solid #eee;">
                <p>الإجمالي: <strong>49 SAR</strong></p>
            </div>

            <div class="box">
                <h3>بيانات الشحن</h3>
                <form id="orderForm">
                    <div class="input-group">
                        <label>الاسم الكامل</label>
                        <input type="text" placeholder="مثال: عبد الرحمن..." required>
                    </div>
                    <div class="input-group">
                        <label>رقم الجوال</label>
                        <input type="tel" placeholder="05xxxxxxxx" required>
                    </div>
                    <div class="input-group">
                        <label>المدينة</label>
                        <select required>
                            <option value="">اختر مدينتك</option>
                            <option>الدمام</option><option>الرياض</option><option>جدة</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>العنوان بالتفصيل</label>
                        <input type="text" placeholder="الحي، اسم الشارع" required>
                    </div>
                    <button type="submit" class="btn-primary btn-success">تأكيد الطلب - دفع عند الاستلام</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
