<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NomadByte | لوحة التحكم المتطورة</title>
    <style>
        :root {
            --primary: #007bff;
            --dark: #1a1a1a;
            --light-bg: #f8f9fa;
            --success: #28a745;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--light-bg); margin: 0; display: flex; }
        
        /* القائمة الجانبية */
        .sidebar { width: 250px; background: var(--dark); height: 100vh; color: white; padding: 20px; position: fixed; }
        .sidebar h2 { color: var(--primary); text-align: center; }
        .sidebar-menu { list-style: none; padding: 0; margin-top: 30px; }
        .sidebar-menu li { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .sidebar-menu li:hover { background: #333; color: var(--primary); }

        /* المحتوى الرئيسي */
        .main-content { margin-right: 250px; padding: 30px; width: calc(100% - 250px); }
        .header-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        
        /* الجدول */
        .table-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #eee; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; background: #fff3cd; color: #856404; }

        /* نافذة الإضافة (Pop-up) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center;
        }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 400px; position: relative; }
        .modal-content h3 { margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .add-btn { background: var(--primary); color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; margin-bottom: 20px; }
        .save-btn { background: var(--success); color: white; width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>NomadByte</h2>
        <ul class="sidebar-menu">
            <li>🏠 الرئيسية</li>
            <li>📦 إدارة الشحنات</li>
            <li>📊 التقارير</li>
        </ul>
    </div>

    <div class="main-content">
        <button class="add-btn" onclick="toggleModal(true)">+ إضافة شحنة جديدة</button>
        <h1>إدارة الشحنات</h1>

        <div class="table-container">
            <table id="shipmentTable">
                <thead>
                    <tr>
                        <th>رقم الشحنة</th>
                        <th>العميل</th>
                        <th>التاريخ</th>
                        <th>الحالة</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <h3>تفاصيل الشحنة الجديدة</h3>
            <div class="form-group">
                <label>اسم العميل:</label>
                <input type="text" id="customerName" placeholder="أدخل اسم العميل">
            </div>
            <div class="form-group">
                <label>رقم الشحنة:</label>
                <input type="text" id="shipmentID" placeholder="مثال: NB-5050">
            </div>
            <button class="save-btn" onclick="saveShipment()">حفظ الشحنة</button>
            <button style="background:none; border:none; color:red; cursor:pointer; width:100%; margin-top:10px;" onclick="toggleModal(false)">إلغاء</button>
        </div>
    </div>

    <script>
        // فتح وإغلاق النافذة
        function toggleModal(show) {
            document.getElementById('modalOverlay').style.display = show ? 'flex' : 'none';
        }

        // حفظ الشحنة وإضافتها للجدول
        function saveShipment() {
            const name = document.getElementById('customerName').value;
            const id = document.getElementById('shipmentID').value;
            const date = new Date().toLocaleDateString('ar-EG');

            if(name && id) {
                const table = document.getElementById('shipmentTable').getElementsByTagName('tbody')[0];
                const newRow = table.insertRow();

                newRow.innerHTML = `
                    <td>${id}</td>
                    <td>${name}</td>
                    <td>${date}</td>
                    <td><span class="status-badge">🕒 تحت المعالجة</span></td>
                `;

                alert("✅ تم حفظ الشحنة بنجاح في النظام!");
                toggleModal(false);
                
                // تنظيف الحقول
                document.getElementById('customerName').value = '';
                document.getElementById('shipmentID').value = '';
            } else {
                alert("يرجى تعبئة جميع الحقول");
            }
        }
    </script>
</body>
</html>
