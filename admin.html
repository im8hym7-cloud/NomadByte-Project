<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NomadByte | حقيبة غسيل الأحذية</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; text-align: center; }
        .product-card { background: white; max-width: 400px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .product-image { width: 100%; border-radius: 10px; }
        h2 { color: #333; }
        .price { font-size: 24px; color: #27ae60; font-weight: bold; margin: 15px 0; }
        .input-group { text-align: right; margin-bottom: 10px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn-order { background-color: #e67e22; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; font-size: 18px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="product-card">
    <img src="S59152822e94045e799d354f95f410bdbX.avif" alt="حقيبة غسيل الأحذية" class="product-image">
    
    <h2>حقيبة غسيل الأحذية الذكية</h2>
    <p>احمِ غسالتك وحذائك المفضل من التلف أثناء الغسيل.</p>
    
    <div class="price">49 ريال سعودي</div>

    <div class="input-group">
        <input type="text" id="custName" placeholder="الاسم بالكامل">
    </div>
    <div class="input-group">
        <input type="tel" id="custPhone" placeholder="رقم الجوال">
    </div>
    <div class="input-group">
        <input type="text" id="custCity" placeholder="المدينة والحي">
    </div>

    <button class="btn-order">اطلب الآن (الدفع عند الاستلام/بطاقة)</button>
</div>

</body>
</html>
