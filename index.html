<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NomadByte | حقيبة غسيل الأحذية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="product-card">
            <div class="media-column">
                <div class="main-view">
                    <div id="videoContainer">
                        <video autoplay muted loop playsinline><source src="حقيبة%20غسيل%20الأحذية2.mp4" type="video/mp4"></video>
                    </div>
                    <img id="mainImage" src="" style="display: none;">
                </div>
                <div class="image-gallery">
                    <img src="1.jpg" onmouseover="showImg(this.src)" onclick="showImg(this.src)">
                    <img src="2.jpg" onmouseover="showImg(this.src)" onclick="showImg(this.src)">
                    <img src="3.jpg" onmouseover="showImg(this.src)" onclick="showImg(this.src)">
                    <img src="4.jpg" onmouseover="showImg(this.src)" onclick="showImg(this.src)">
                    <img src="5.jpg" onmouseover="showImg(this.src)" onclick="showImg(this.src)">
                    <img src="6.jpg" onmouseover="showImg(this.src)" onclick="showImg(this.src)">
                    <img src="7.jpg" onmouseover="showImg(this.src)" onclick="showImg(this.src)">
                    <img src="8.jpg" onmouseover="showImg(this.src)" onclick="showImg(this.src)">
                </div>
                <button onclick="resetVideo()" style="margin-top:10px; background:none; border:1px solid #ddd; padding:5px; border-radius:5px; cursor:pointer;">🔄 العودة للفيديو</button>
            </div>
            <div class="info-column">
                <span style="background:var(--primary); padding:5px 10px; border-radius:8px; font-weight:bold;">NomadByte Original</span>
                <h1 style="font-size: 34px; margin-top:15px;">حقيبة غسيل الأحذية الذكية</h1>
                <p style="font-size: 40px; color: var(--blue); font-weight: 900;">49 SAR <span style="font-size:20px; color:#999; text-decoration:line-through;">99 SAR</span></p>
                <a href="checkout.html" class="buy-btn">شراء الآن - دفع عند الاستلام</a>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
