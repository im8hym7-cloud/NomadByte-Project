<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NomadByte - حقيبة الأحذية الذكية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="product-card">
        
        <div class="visual-section">
            <div class="main-video">
                <video controls poster="icon.png">
                    <source src="video.mp4" type="video/mp4">
                    متصفحك لا يدعم تشغيل الفيديو.
                </video>
            </div>
            
            <div class="image-grid">
                <img src="5.jpg" alt="Product 1">
                <img src="6.jpg" alt="Product 2">
                <img src="7.jpg" alt="Product 3">
                <img src="8.jpg" alt="Product 4">
                <img src="5.jpg" alt="Product 5">
                <img src="6.jpg" alt="Product 6">
                <img src="7.jpg" alt="Product 7">
                <img src="8.jpg" alt="Product 8">
            </div>
        </div>

        <div class="details-section">
            <span class="badge">NomadByte Original</span>
            <h1>حقيبة غسيل الأحذية الذكية</h1>
            
            <div class="price-tag">
                <span class="current-price">49 SAR</span>
                <span class="old-price">99 SAR</span>
            </div>

            <ul class="features">
                <li>✅ مصنوعة من نسيج الشانيل الكثيف للتنظيف العميق.</li>
                <li>✅ تحمي الغسالة من الصدمات وتمنع تلف الأحذية.</li>
                <li>✅ سهلة الاستخدام وموفرة للوقت والمجهود.</li>
                <li>✅ مثالية للأحذية الرياضية والقماشية.</li>
            </ul>

            <button class="cta-button" id="buyNow">
                شراء الآن - دفع آمن 💳
            </button>
            
            <p class="shipping-info">توصيل سريع لكافة مناطق المملكة SA</p>
        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
