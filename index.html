<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NomadByte | حقيبة غسيل الأحذية الذكية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <div class="product-card">
            
            <div class="media-column">
                <div class="video-wrapper">
                    <video controls autoplay muted loop playsinline>
                        <source src="حقيبة%20غسيل%20الأحذية٢.mp4" type="video/mp4">
                        متصفحك لا يدعم تشغيل الفيديو.
                    </video>
                </div>

                <div class="image-gallery">
                    <img src="5.jpg" alt="صورة المنتج">
                    <img src="6.jpg" alt="صورة المنتج">
                    <img src="7.jpg" alt="صورة المنتج">
                    <img src="8.jpg" alt="صورة المنتج">
                </div>
            </div>

            <div class="info-column">
                <div class="brand-badge">NomadByte Original</div>
                <h1 class="product-title">حقيبة غسيل الأحذية الذكية</h1>
                
                <div class="price-section">
                    <span class="price-now">49 SAR</span>
                    <span class="price-was">99 SAR</span>
                </div>

                <ul class="features-list">
                    <li>✅ مصنوعة من نسيج الشانيل الكثيف للتنظيف العميق.</li>
                    <li>✅ تحمي الغسالة من الصدمات وتمنع تلف الأحذية.</li>
                    <li>✅ سهلة الاستخدام وموفرة للوقت والمجهود.</li>
                    <li>✅ مثالية للأحذية الرياضية والقماشية.</li>
                </ul>

                <button class="buy-btn" onclick="location.href='checkout.html'">
                    شراء الآن - دفع آمن 💳
                </button>
                
                <p class="shipping-note">توصيل سريع لكافة مناطق المملكة SA</p>
            </div>

        </div>
    </div>

</body>
</html>
