<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NomadByte | Magnetic Gym Bag</title>
    <style>
        :root {
            --main-color: #007bff;
            --dark-bg: #1a1a1a;
            --text-gray: #666;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #fff;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            align-items: flex-start;
        }
        .product-images {
            flex: 1;
            min-width: 300px;
        }
        .main-img {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .thumbnails {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .thumbnails img {
            width: 70px;
            height: 70px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.3s;
        }
        .thumbnails img:hover {
            border-color: var(--main-color);
        }
        .product-details {
            flex: 1;
            min-width: 300px;
        }
        .brand-name {
            color: var(--main-color);
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        .product-title {
            font-size: 2rem;
            margin: 10px 0;
            color: var(--dark-bg);
        }
        .price-tag {
            font-size: 1.5rem;
            margin: 15px 0;
        }
        .current-price {
            color: var(--main-color);
            font-weight: bold;
            font-size: 1.8rem;
        }
        .old-price {
            text-decoration: line-through;
            color: #999;
            font-size: 1.2rem;
            margin-right: 10px;
        }
        .currency {
            font-size: 1rem;
        }
        .description {
            line-height: 1.6;
            color: var(--text-gray);
            margin-bottom: 25px;
        }
        .buy-btn {
            background-color: var(--dark-bg);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }
        .buy-btn:hover {
            background-color: #333;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="product-images">
            <img src="1.jpg" id="mainImage" class="main-img" alt="Magnetic Gym Bag">
            <div class="thumbnails">
                <img src="1.jpg" onclick="changeImage('1.jpg')">
                <img src="2.jpg" onclick="changeImage('2.jpg')">
                <img src="3.jpg" onclick="changeImage('3.jpg')">
                <img src="4.jpg" onclick="changeImage('4.jpg')">
            </div>
        </div>

        <div class="product-details">
            <span class="brand-name">NOMADBYTE ORIGINAL</span>
            <h1 class="product-title">Magnetic Gym Bag</h1>
            
            <div class="price-tag">
                <span class="current-price">249 <small class="currency">SAR</small></span>
                <span class="old-price">428 SAR</span>
            </div>

            <p class="description">
                الحل الابتكاري لتصوير تمارينك وتثبيت أدواتك الرياضية بمغناطيس N52 القوي. تصميم متين وعملي يناسب احتياجاتك اليومية في النادي الرياضي.
            </p>

            <button class="buy-btn">
                <span>شراء الآن - دفع آمن</span>
                <img src="https://img.icons8.com/ios-filled/25/ffffff/safe-ok.png" alt="safe icon">
            </button>
        </div>
    </div>

    <script>
        function changeImage(src) {
            document.getElementById('mainImage').src = src;
        }
    </script>
</body>
</html>
