<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NomadByte | حقيبة غسيل الأحذية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <div class="product-card">
            
            <div class="media-column">
                <div class="main-display">
                    <div id="videoContainer">
                        <video id="mainVideo" controls autoplay muted loop playsinline>
                            <source src="حقيبة%20غسيل%20الأحذية2.mp4" type="video/mp4">
                        </video>
                    </div>
                    <img id="mainImage" src="" alt="عرض المنتج" style="display: none;">
                </div>

                <div class="image-gallery">
                    <img src="1.jpg" onmouseover="showMedia(this.src)" onclick="showMedia(this.src)">
                    <img src="2.jpg" onmouseover="showMedia(this.src)" onclick="showMedia(this.src)">
                    <img src="3.jpg" onmouseover="showMedia(this.src)" onclick="showMedia(this.src)">
                    <img src="4.jpg" onmouseover="showMedia(this.src)" onclick="showMedia(this.src)">
                    <img src="5.jpg" onmouseover="showMedia(this.src)" onclick="showMedia(this.src)">
                    <img src="6.jpg" onmouseover="showMedia(this.src)" onclick="showMedia(this.src)">
                    <img src="7.jpg" onmouseover="showMedia(this.src)" onclick="showMedia(this.src)">
                    <img src="8.jpg" onmouseover="showMedia(this.src)" onclick="showMedia(this.src)">
                </div>
                <button class="reset-video" onclick="resetToVideo()">🔄 العودة للفيديو</button>
            </div>

            <div class="info-column">
                <div class="brand-badge">NomadByte Original</div>
                <h1 class="product-title">حقيبة غسيل الأحذية الذكية</h1>
                <div class="price-section">
                    <span class="price-now">49 SAR</span>
                    <span class="price-was">99 SAR</span>
                </div>
                <ul class="features-list">
                    <li>✅ نسيج شانيل كثيف للتنظيف العميق.</li>
                    <li>✅ حماية كاملة للحذاء والغسالة.</li>
                    <li>✅ سحاب مخفي لضمان عدم الانفتاح.</li>
                </ul>
                <a href="checkout.html" class="buy-btn">شراء الآن - دفع عند الاستلام</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
